[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"

# Local dev — runs Next.js on 3000, netlify dev proxy on 8888
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# Skip builds on draft branches created by the editorial workflow.
# This means saving a draft in the CMS will NOT trigger a deploy.
# Only publishing (merging to main) triggers a production build.
[context.branch-deploy]
  ignore = "exit 1"

# Also skip deploy previews for pull requests (draft PRs from editorial workflow)
[context.deploy-preview]
  ignore = "exit 1"

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Security headers applied to every page and asset
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Prevent framing from other origins (clickjacking protection)
    X-Frame-Options = "SAMEORIGIN"
    # Limit referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable browser features this site doesn't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# Cache RSS feed for 1 hour so readers don't hammer the server
[[headers]]
  for = "/feed.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/rss+xml; charset=utf-8"
