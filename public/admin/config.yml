backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

slug:
  encoding: "ascii"
  clean_accents: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "featuredImage", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short description for post preview" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options: ["Travel", "Baking", "Lifestyle"],
          default: "Travel"
        }
      - {
          label: "Featured Post",
          name: "featured",
          widget: "boolean",
          default: false,
          hint: "Featured posts appear prominently on the homepage"
        }
      - { label: "Body", name: "body", widget: "markdown" }
      - {
          label: "Gallery Images",
          name: "gallery",
          widget: "list",
          required: false,
          hint: "Optional: Add multiple images for a gallery in the post",
          field: { label: "Image", name: "image", widget: "image" }
        }
      - {
          label: "Tags",
          name: "tags",
          widget: "list",
          required: false,
          hint: "Optional tags for the post"
        }
      - {
          label: "This post has a recipe",
          name: "isRecipe",
          widget: "boolean",
          default: false,
          hint: "Turn this on to show a Recipe Card, a 'Jump to Recipe' button, and help this post show up in Google recipe searches"
        }
      - {
          label: "Recipe Details",
          name: "recipe",
          widget: "object",
          required: false,
          collapsed: true,
          hint: "Only needed if 'This post has a recipe' is on",
          fields: [
            { label: "Prep Time", name: "prepTime", widget: "string", required: false, hint: "e.g. 20 mins" },
            { label: "Cook Time", name: "cookTime", widget: "string", required: false, hint: "e.g. 45 mins" },
            { label: "Servings", name: "servings", widget: "string", required: false, hint: "e.g. Serves 8" },
            { label: "Cuisine", name: "cuisine", widget: "string", required: false, hint: "e.g. French, Japanese, Italian — helps Google categorise the recipe" },
            { label: "Recipe Category", name: "recipeCategory", widget: "string", required: false, hint: "e.g. Dessert, Main Course, Appetizer, Breakfast — helps Google categorise the recipe" },
            {
              label: "Ingredients",
              name: "ingredients",
              widget: "list",
              required: false,
              hint: "Add one ingredient per line, e.g. '125g all-purpose flour'",
              field: { label: "Ingredient", name: "ingredient", widget: "string" }
            },
            {
              label: "Instructions",
              name: "instructions",
              widget: "list",
              required: false,
              hint: "Add one step per line, in order",
              field: { label: "Step", name: "step", widget: "string" }
            }
          ]
        }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "content/settings/general.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Site Description", name: "description", widget: "text" }
          - { label: "Author Name", name: "author", widget: "string" }
          - {
              label: "Homepage About Section",
              name: "homeAbout",
              widget: "text",
              hint: "Short intro shown on the homepage About Me section"
            }
          - {
              label: "Homepage About Photo",
              name: "profileImage",
              widget: "image",
              required: false,
              hint: "Photo shown in the homepage About Me section"
            }
          - {
              label: "About Page Content",
              name: "aboutPage",
              widget: "markdown",
              hint: "Long-form content for the full About page"
            }
          - {
              label: "About Page Image",
              name: "aboutPageImage",
              widget: "image",
              required: false,
              hint: "Optional image shown at the top of the About page"
            }
          - {
              label: "Social Media",
              name: "social",
              widget: "object",
              fields: [
                { label: "Instagram", name: "instagram", widget: "string", required: false },
                { label: "Pinterest", name: "pinterest", widget: "string", required: false },
                { label: "Email", name: "email", widget: "string", required: false }
              ]
            }
